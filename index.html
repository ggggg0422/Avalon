<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿瓦隆網頁小幫手</title>
    <style>
        :root {
            --panel-bg: rgba(22, 33, 62, 0.9);
            --text-color: #e94560;
            --good-color: #4da6ff;
            --evil-color: #ff4d4d;
            --gold: #d4af37;
            --purple: #b366ff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(10, 15, 25, 0.8), rgba(10, 15, 25, 0.8)), url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            zoom: 1.2; /* ★ 整體畫面等比例放大 120% */
        }
        .screen.active {
            display: block;
        }
        h1, h2, h3 { color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        button {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px auto; 
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { background-color: #c8324a; transform: translateY(-2px); }
        .btn-gold { background-color: var(--gold); color: #1a1a2e; }
        .btn-gold:hover { background-color: #b5952f; }
        .btn-danger { background-color: transparent; border: 2px solid var(--evil-color); color: var(--evil-color); margin-top: 30px;}
        .btn-danger:hover { background-color: var(--evil-color); color: white; }
        
        /* ====== 特殊角色選擇面板樣式 ====== */
        .role-list { 
            text-align: center; 
            margin-bottom: 20px; 
        }
        
        .role-checkbox {
            display: none;
        }

        .role-item { 
            display: inline-block;
            padding: 10px 16px;
            margin: 6px 4px; 
            font-size: 15px; 
            border-radius: 25px;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.35; 
            transition: all 0.25s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .role-checkbox:checked + .role-item {
            opacity: 1; 
            background: rgba(22, 33, 62, 0.8);
        }
        
        .role-checkbox:checked + .good { 
            color: var(--good-color); 
            font-weight: bold; 
            border: 1.5px solid var(--good-color);
            text-shadow: 0 0 8px rgba(77, 166, 255, 0.6);
            box-shadow: 0 0 12px rgba(77, 166, 255, 0.4);
        }
        
        .role-checkbox:checked + .evil { 
            color: var(--evil-color); 
            font-weight: bold; 
            border: 1.5px solid var(--evil-color);
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
            box-shadow: 0 0 12px rgba(255, 77, 77, 0.4);
        }

        /* 文字顏色的基礎類別 */
        .good { color: var(--good-color); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        .evil { color: var(--evil-color); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        .purple { color: var(--purple); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        
        /* ====== 客製化下拉選單 CSS ====== */
        .custom-select-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }
        
        .custom-select-display {
            padding: 10px 15px;
            background-color: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid var(--gold);
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .custom-select-options {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            min-width: max-content;
            background-color: rgba(15, 23, 42, 0.98);
            border: 1px solid var(--gold);
            border-radius: 5px;
            z-index: 100;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            white-space: nowrap;
        }

        .custom-select-options.show {
            display: block;
        }

        .custom-option {
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 16px;
        }

        .custom-option:hover {
            background-color: rgba(212, 175, 55, 0.2);
        }

        #setup-error { color: var(--evil-color); font-weight: bold; margin: 10px 0; min-height: 20px; }

        /* ====== 3D 翻牌動畫 CSS ====== */
        .card-container {
            perspective: 1000px; 
            border: none;
            padding: 0;
            margin: 20px auto;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            background-color: transparent;
            -webkit-touch-callout: none;
            width: 280px; 
            height: 392px; 
            border-radius: 15px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); 
            transform-style: preserve-3d;
            position: relative;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .card-back {
            background-color: transparent;
            justify-content: center;
            align-items: center;
        }

        .card-front {
            background-image: url('https://i.postimg.cc/Kz4pwxC0/66666.jpg');
            background-size: cover;
            background-position: center;
            transform: rotateY(180deg);
            box-sizing: border-box;
            border: none; 
            display: block; 
            position: relative; 
            padding: 0; 
        }

        #card-back-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .card-back .instruction {
            position: absolute;
            bottom: 55px; 
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--gold);
        }
        
        /* 角色名稱定位 */
        #player-role-name {
            margin: 0;
            font-size: 32px; 
            position: absolute;
            top: 55px; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        /* 角色圖案定位 */
        .role-img {
            width: 156px; 
            height: 156px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            object-fit: contain; 
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            background-color: #222;
            pointer-events: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            margin: 0; 
        }

        /* 角色資訊定位 */
        #player-info-text { 
            font-size: 16px; 
            line-height: 1.5; 
            background: transparent; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9); 
            padding: 8px 10px; 
            border-radius: 8px; 
            box-sizing: border-box;
            position: absolute; 
            bottom: 45px; 
            left: 50%; 
            transform: translateX(-50%); 
            margin: 0; 
            width: 85%; 
        }

        /* ====== 遊戲結束樣式 ====== */
        
        /* 1. 給遊戲畫面一個基礎高度，以便讓按鈕置中 */
        #game-screen.active {
            display: flex;
            flex-direction: column;
            min-height: 500px; /* 給一個基礎高度 Baseline */
            padding: 0; /* 重置 padding，交給 Flex 子元素處理 */
        }
        
        /* 2. 重啟按鈕的容器，平時負責垂直置中的正方形按鈕 */
        #game-end-controls {
            flex: 1; /* 佔滿剩餘垂直空間 */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 3. 修改按鈕為正方形並置中 */
        #reveal-all-btn {
            width: 200px; /* 正方形寬度 */
            height: 200px; /* 正方形高度 */
            padding: 15px; /* 內部間距，讓文字換行 */
            font-size: 20px; /* 字體稍微加大 */
            border-radius: 15px; /* 稍微圓潤的直角 */
            
            /* 文字換行並置中 */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.4;
            margin: 0; /* 移除原本的 margin auto */
        }

        /* 遊戲結束名單列表容器 */
        #final-reveal-list {
            display: flex;
            gap: 15px; 
            margin-top: 15px;
        }

        .final-reveal-column {
            flex: 1;
            background: transparent; 
            border: 4px solid var(--gold); 
            border-radius: 10px;
            padding: 10px; 
            display: flex;
            flex-direction: column;
            gap: 10px; 
            box-sizing: border-box;
        }
        
        .final-reveal-item {
            background: rgba(34, 34, 34, 0.95); 
            border: 1px solid #444; 
            border-radius: 8px;
            margin: 0; 
            padding: 12px 5px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .player-number-text {
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .action-white-text {
            color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1 style="color: #B58252;">阿瓦隆小幫手</h1>
        
        <div class="role-list">
            <h3>選擇遊戲人數</h3>
            
            <div class="custom-select-wrapper">
                <input type="hidden" id="player-count" value="10">
                <div class="custom-select-display" id="custom-select-display">
                    <span>10 人局 (<span class="good">6好人</span> <span class="evil">4壞人</span>)</span>
                    <span style="font-size: 12px;">▼</span>
                </div>
                <div class="custom-select-options" id="custom-select-options">
                    <div class="custom-option" data-value="5">5 人局 (<span class="good">3好人</span> <span class="evil">2壞人</span>)</div>
                    <div class="custom-option" data-value="6">6 人局 (<span class="good">4好人</span> <span class="evil">2壞人</span>)</div>
                    <div class="custom-option" data-value="7">7 人局 (<span class="good">4好人</span> <span class="evil">3壞人</span>)</div>
                    <div class="custom-option" data-value="8">8 人局 (<span class="good">5好人</span> <span class="evil">3壞人</span>)</div>
                    <div class="custom-option" data-value="9">9 人局 (<span class="good">5好人</span> <span class="evil">4壞人</span>)</div>
                    <div class="custom-option" data-value="10">10 人局 (<span class="good">6好人</span> <span class="evil">4壞人</span>)</div>
                </div>
            </div>

            <h3>選擇特殊角色</h3>
            <p style="font-size: 12px; color: #ccc;">空位自動補<span class="good">忠臣</span>或<span class="evil">爪牙</span></p>
            
            <input type="checkbox" id="role-merlin" class="role-checkbox" checked>
            <label for="role-merlin" class="role-item good">梅林</label>

            <input type="checkbox" id="role-percival" class="role-checkbox" checked>
            <label for="role-percival" class="role-item good">派西維爾</label>

            <input type="checkbox" id="role-lizakang" class="role-checkbox">
            <label for="role-lizakang" class="role-item good">李砸康</label>

            <input type="checkbox" id="role-assassin" class="role-checkbox" checked>
            <label for="role-assassin" class="role-item evil">刺客</label>

            <input type="checkbox" id="role-morgana" class="role-checkbox" checked>
            <label for="role-morgana" class="role-item evil">莫甘娜</label>

            <input type="checkbox" id="role-mordred" class="role-checkbox" checked>
            <label for="role-mordred" class="role-item evil">莫德雷德</label>

            <input type="checkbox" id="role-oberon" class="role-checkbox" checked>
            <label for="role-oberon" class="role-item evil">奧伯倫</label>
        </div>
        
        <div id="setup-error"></div>
        <button class="btn-gold" onclick="startGame()">開始分配角色</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2 id="current-player-title"><span class="player-number-text">1號</span> <span class="action-white-text">請查驗身分</span></h2>
        
        <div class="card-container" id="reveal-card">
            <div class="card-inner" id="card-inner">
                <div class="card-face card-back">
                    <img src="https://i.postimg.cc/QdHBXdPk/card0back.png" alt="Avalon Card Back" id="card-back-img">
                    <div class="instruction">👆 點擊翻開</div>
                </div>
                <div class="card-face card-front" id="card-content">
                    <h2 id="player-role-name">角色名稱</h2>
                    <img id="player-role-img" class="role-img" src="" alt="角色圖片">
                    <div id="player-info-text">你的專屬資訊將顯示於此。</div>
                </div>
            </div>
        </div>
        
        <button id="next-player-btn" onclick="nextPlayer()" style="display:none;">看完了 下一位</button>
    </div>

    <div id="game-screen" class="screen">
        
        <div id="game-end-controls">
            <button id="reveal-all-btn" class="btn-danger" onclick="revealAll()">遊戲結束：查看所有人身分</button>
        </div>

        <div id="final-reveal-area" style="display: none; margin-top: 30px;">
            <h3 style="margin-bottom: 20px;">真實身分揭曉</h3>
            <div id="final-reveal-list"></div>
            <button class="btn-gold" onclick="location.reload()" style="margin-top: 30px; padding: 15px 30px; font-size: 18px;">重新一局</button>
        </div>
    </div>

    <script>
        const preloadedBg = new Image();
        preloadedBg.src = "https://i.postimg.cc/Kz4pwxC0/66666.jpg";

        const roleData = {
            merlin: { name: "梅林", isEvil: false, img: "https://i.postimg.cc/hjV0JNdY/7.jpg" },
            percival: { name: "派西維爾", isEvil: false, img: "https://i.postimg.cc/pLhXMqBs/010.jpg" },
            lizakang: { name: "李砸康", isEvil: false, img: "https://i.postimg.cc/vHSHKp5q/020.jpg" },
            servant: { name: "亞瑟的忠臣", isEvil: false, img: "https://i.postimg.cc/JnjQySkx/5.jpg" },
            assassin: { name: "刺客", isEvil: true, img: "https://i.postimg.cc/vmJzZGcz/4.jpg" },
            morgana: { name: "莫甘娜", isEvil: true, img: "https://i.postimg.cc/xdwR19c5/3.jpg" },
            mordred: { name: "莫德雷德", isEvil: true, img: "https://i.postimg.cc/XvR8YnpP/2.jpg" },
            oberon: { name: "奧伯倫", isEvil: true, img: "https://i.postimg.cc/fLYv319B/1.jpg" },
            minion: { name: "莫德雷德的爪牙", isEvil: true, img: "https://i.postimg.cc/XJW6LdYF/8.jpg" }
        };

        Object.values(roleData).forEach(role => {
            const img = new Image();
            img.src = role.img;
        });

        const rules = {
            5: { good: 3, evil: 2 },
            6: { good: 4, evil: 2 },
            7: { good: 4, evil: 3 },
            8: { good: 5, evil: 3 },
            9: { good: 5, evil: 4 },
            10: { good: 6, evil: 4 }
        };

        let players = [];
        let currentPlayerIndex = 0;
        let isTransitioning = false; 

        // ====== 客製化下拉選單邏輯 ======
        document.addEventListener('DOMContentLoaded', () => {
            const display = document.getElementById('custom-select-display');
            const options = document.getElementById('custom-select-options');
            const input = document.getElementById('player-count');

            display.addEventListener('click', (e) => {
                e.stopPropagation();
                options.classList.toggle('show');
            });

            document.querySelectorAll('.custom-option').forEach(opt => {
                opt.addEventListener('click', function(e) {
                    e.stopPropagation();
                    input.value = this.dataset.value;
                    display.innerHTML = `<span>${this.innerHTML}</span> <span style="font-size: 12px;">▼</span>`;
                    options.classList.remove('show');
                    updateDefaultRoles();
                });
            });

            document.addEventListener('click', () => {
                options.classList.remove('show');
            });
        });

        function updateDefaultRoles() {
            const count = parseInt(document.getElementById('player-count').value);
            
            const merlin = document.getElementById('role-merlin');
            const percival = document.getElementById('role-percival');
            const lizakang = document.getElementById('role-lizakang');
            const assassin = document.getElementById('role-assassin');
            const morgana = document.getElementById('role-morgana');
            const mordred = document.getElementById('role-mordred');
            const oberon = document.getElementById('role-oberon');

            merlin.checked = false;
            percival.checked = false;
            lizakang.checked = false;
            assassin.checked = false;
            morgana.checked = false;
            mordred.checked = false;
            oberon.checked = false;

            switch(count) {
                case 5:
                    merlin.checked = true;
                    assassin.checked = true;
                    break;
                case 6:
                    merlin.checked = true;
                    lizakang.checked = true;
                    mordred.checked = true;
                    assassin.checked = true;
                    break;
                case 7:
                    merlin.checked = true;
                    percival.checked = true;
                    mordred.checked = true;
                    morgana.checked = true;
                    oberon.checked = true;
                    break;
                case 8:
                    merlin.checked = true;
                    percival.checked = true;
                    mordred.checked = true;
                    morgana.checked = true;
                    assassin.checked = true;
                    break;
                case 9:
                    merlin.checked = true;
                    percival.checked = true;
                    lizakang.checked = true;
                    assassin.checked = true;
                    morgana.checked = true;
                    mordred.checked = true;
                    oberon.checked = true;
                    break;
                case 10:
                    merlin.checked = true;
                    percival.checked = true;
                    assassin.checked = true;
                    morgana.checked = true;
                    mordred.checked = true;
                    oberon.checked = true;
                    break;
            }
        }

        function startGame() {
            const errorEl = document.getElementById('setup-error');
            errorEl.innerText = "";
            currentPlayerIndex = 0; 
            players = [];

            const playerCount = parseInt(document.getElementById('player-count').value);
            const ratio = rules[playerCount];

            let goodRoles = [];
            let evilRoles = [];

            if(document.getElementById('role-merlin').checked) goodRoles.push('merlin');
            if(document.getElementById('role-percival').checked) goodRoles.push('percival');
            if(document.getElementById('role-lizakang').checked) goodRoles.push('lizakang');
            if(document.getElementById('role-assassin').checked) evilRoles.push('assassin');
            if(document.getElementById('role-morgana').checked) evilRoles.push('morgana');
            if(document.getElementById('role-mordred').checked) evilRoles.push('mordred');
            if(document.getElementById('role-oberon').checked) evilRoles.push('oberon');

            if(goodRoles.length > ratio.good || evilRoles.length > ratio.evil) {
                errorEl.innerText = `⚠️ 無法開始：${playerCount} 人局的上限是 ${ratio.good} 名好人與 ${ratio.evil} 名壞人。請調整特殊角色數量！`;
                return;
            }

            if(goodRoles.length === 0 && ratio.good > 0) {
                 if(!confirm("⚠️ 警告：目前正義方沒有任何特殊角色(如梅林、李砸康)，遊戲可能變得極難。確定要開始嗎？")) {
                     return;
                 }
            }

            while(goodRoles.length < ratio.good) goodRoles.push('servant');
            while(evilRoles.length < ratio.evil) evilRoles.push('minion');

            let selectedRoles = goodRoles.concat(evilRoles);
            selectedRoles = selectedRoles.sort(() => Math.random() - 0.5);

            players = selectedRoles.map((roleKey, index) => {
                return {
                    id: index + 1,
                    roleKey: roleKey,
                    role: roleData[roleKey],
                    info: ""
                };
            });

            generateInfo();

            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('pass-screen').classList.add('active');
            showPlayerPassScreen();
        }

        function generateInfo() {
            const teamEvil = players.filter(p => p.role.isEvil && p.roleKey !== 'oberon').map(p => p.id + "號");
            const seenByMerlin = players.filter(p => p.role.isEvil && p.roleKey !== 'mordred').map(p => p.id + "號");
            const seenByPercival = players.filter(p => p.roleKey === 'merlin' || p.roleKey === 'morgana').map(p => p.id + "號");

            let seenByLiZakang = players.filter(p => p.roleKey === 'merlin' || p.roleKey === 'mordred').map(p => p.id + "號");
            seenByLiZakang = seenByLiZakang.sort(() => Math.random() - 0.5);

            players.forEach(p => {
                if (p.roleKey === 'merlin') {
                    p.info = `你看到的壞人<br><strong class="evil">${seenByMerlin.join(' ') || '無'}</strong>`;
                } else if (p.roleKey === 'percival') {
                    p.info = `梅林或莫甘娜<br><strong class="purple">${seenByPercival.join(' ') || '無'}</strong>`;
                } else if (p.roleKey === 'lizakang') {
                    if(seenByLiZakang.length > 0) {
                         p.info = `梅林或莫德雷德<br><strong class="purple">${seenByLiZakang.join(' ')}</strong>`;
                    } else {
                         p.info = "你感應到了無盡的虛空。<br>本局似乎沒有相關特殊角色。";
                    }
                } else if (p.role.isEvil && p.roleKey !== 'oberon') {
                    const otherEvils = teamEvil.filter(id => id !== p.id + "號");
                    if(otherEvils.length > 0) {
                        p.info = `你的壞人同伴<br><strong class="evil">${otherEvils.join(' ')}</strong>`;
                    } else {
                        p.info = "你是唯一的邪惡陣營<br>(或其他人是奧伯倫)。";
                    }
                } else if (p.roleKey === 'oberon') {
                    p.info = "只知道自己是壞人<br>沒有其他資訊";
                } else {
                    p.info = "你是普通忠臣<br>沒有其他資訊";
                }
            });
        }

        const revealCardWrapper = document.getElementById('reveal-card');
        const nextBtn = document.getElementById('next-player-btn');
        const cardInner = document.getElementById('card-inner');

        function flipCard() {
            if (isTransitioning) return; 
            if (cardInner.classList.contains('flipped')) return;

            cardInner.classList.add('flipped');
            nextBtn.style.display = 'inline-block';

            const player = players[currentPlayerIndex];
            document.getElementById('current-player-title').innerHTML = `<span class="player-number-text">${player.id}號</span> <span class="action-white-text">你的身分是 ⬇️</span>`;
        }

        revealCardWrapper.addEventListener('click', flipCard);

        function showPlayerPassScreen() {
            const player = players[currentPlayerIndex];
            
            document.getElementById('current-player-title').innerHTML = `<span class="player-number-text">${player.id}號</span> <span class="action-white-text">請查驗身分</span>`;
            
            const roleNameEl = document.getElementById('player-role-name');
            roleNameEl.innerText = player.role.name;
            roleNameEl.className = player.role.isEvil ? 'evil' : 'good';
            
            const roleImgEl = document.getElementById('player-role-img');
            roleImgEl.src = ""; 
            
            setTimeout(() => {
                roleImgEl.src = player.role.img;
            }, 10);
            
            const infoTextEl = document.getElementById('player-info-text');
            infoTextEl.innerHTML = player.info;
            
            infoTextEl.className = '';

            if (currentPlayerIndex === players.length - 1) {
                nextBtn.innerText = "看完了 遊戲開始";
            } else {
                nextBtn.innerText = "看完了 下一位";
            }
        }

        function nextPlayer() {
            if (isTransitioning) return; 
            isTransitioning = true; 

            nextBtn.style.display = 'none';
            cardInner.classList.remove('flipped');

            const player = players[currentPlayerIndex];
            document.getElementById('current-player-title').innerHTML = `<span class="player-number-text">${player.id}號</span> <span class="action-white-text">請查驗身分</span>`;

            setTimeout(() => {
                if (currentPlayerIndex < players.length - 1) {
                    currentPlayerIndex++;
                    showPlayerPassScreen(); 
                } else {
                    document.getElementById('pass-screen').classList.remove('active');
                    showGameScreen();
                }
                
                isTransitioning = false; 
            }, 600);
        }

        function showGameScreen() {
            // 切換到遊戲畫面時，確保容器維持彈性佈局以便置中按鈕
            const gameScreen = document.getElementById('game-screen');
            gameScreen.style.minHeight = '500px'; 
            gameScreen.style.display = 'flex';
            gameScreen.classList.add('active');
        }

        function revealAll() {
            if(confirm("確定要揭曉所有人的真實身分嗎？（如果遊戲還沒結束，請按取消以免破壞體驗）")) {
                const revealArea = document.getElementById('final-reveal-area');
                const listEl = document.getElementById('final-reveal-list');
                const gameEndControls = document.getElementById('game-end-controls'); 
                const gameScreen = document.getElementById('game-screen');
                
                const sortedPlayers = [...players].sort((a, b) => a.id - b.id);
                
                const half = Math.ceil(sortedPlayers.length / 2);
                const col1 = sortedPlayers.slice(0, half);
                const col2 = sortedPlayers.slice(half);

                const renderItem = p => `
                    <div class="final-reveal-item">
                        <span style="color: #ccc; font-size: 14px;">${p.id}號</span>
                        <strong class="${p.role.isEvil ? 'evil' : 'good'}" style="font-size: 18px; margin-top: 2px;">${p.role.name}</strong>
                    </div>`;
                
                listEl.innerHTML = `
                    <div class="final-reveal-column">
                        ${col1.map(renderItem).join('')}
                    </div>
                    <div class="final-reveal-column">
                        ${col2.map(renderItem).join('')}
                    </div>
                `;
                
                // 1. 顯示名單
                revealArea.style.display = 'block';
                // 2. 隱藏置中容器（包含正方形按鈕）
                gameEndControls.style.display = 'none'; 
                // 3. 還原畫面容器排版，交給原本的 padding 和 scrolling
                gameScreen.style.minHeight = 'auto';
                gameScreen.style.display = 'block'; 
                gameScreen.style.padding = '20px';

                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
