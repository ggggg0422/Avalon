<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿瓦隆網頁小幫手</title>
    <style>
        :root {
            --panel-bg: rgba(22, 33, 62, 0.9);
            --text-color: #e94560;
            --good-color: #4da6ff;
            --evil-color: #ff4d4d;
            --gold: #d4af37;
            --purple: #b366ff;
            /* 定義亮黃色變數供按鈕使用 */
            --warning-yellow: #ffcc00; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(10, 15, 25, 0.8), rgba(10, 15, 25, 0.8)), url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            zoom: 1.2; /* ★ 將整體畫面等比例放大 120% */
        }
        .screen.active {
            display: block;
        }
        h1, h2, h3 { color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        button {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px auto; 
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { background-color: #c8324a; transform: translateY(-2px); }
        .btn-gold { background-color: var(--gold); color: #1a1a2e; }
        .btn-gold:hover { background-color: #b5952f; }
        .btn-danger { background-color: transparent; border: 2px solid var(--evil-color); color: var(--evil-color); margin-top: 30px;}
        .btn-danger:hover { background-color: var(--evil-color); color: white; }
        
        /* ====== 特殊角色選擇面板樣式 ====== */
        .role-list { 
            text-align: center; 
            margin-bottom: 20px; 
        }
        
        .role-checkbox {
            display: none;
        }

        .role-item { 
            display: inline-block;
            padding: 10px 16px;
            margin: 6px 4px; 
            font-size: 16px; 
            font-weight: 900; 
            border-radius: 25px;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.35; 
            transition: all 0.25s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .role-checkbox:checked + .role-item {
            opacity: 1; 
        }
        
        /* 替選取的角色加上淡淡的陣營專屬底色 */
        .role-checkbox:checked + .good { 
            color: var(--good-color); 
            font-weight: 900; 
            text-shadow: 0 0 10px rgba(77, 166, 255, 0.8);
            background: rgba(77, 166, 255, 0.15); /* 淡淡的正義藍底色 */
            border: 1px solid rgba(77, 166, 255, 0.3); /* 微透的藍色邊框 */
        }
        
        .role-checkbox:checked + .evil { 
            color: var(--evil-color); 
            font-weight: 900; 
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.8);
            background: rgba(255, 77, 77, 0.15); /* 淡淡的邪惡紅底色 */
            border: 1px solid rgba(255, 77, 77, 0.3); /* 微透的紅色邊框 */
        }

        /* 文字顏色的基礎類別 */
        .good { color: var(--good-color); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        .evil { color: var(--evil-color); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        .purple { color: var(--purple); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        
        /* ====== 客製化下拉選單 CSS ====== */
        .custom-select-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }
        
        .custom-select-display {
            padding: 10px 15px;
            background-color: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid var(--gold);
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .custom-select-options {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            min-width: max-content;
            background-color: rgba(15, 23, 42, 0.98);
            border: 1px solid var(--gold);
            border-radius: 5px;
            z-index: 100;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            white-space: nowrap;
        }

        .custom-select-options.show {
            display: block;
        }

        .custom-option {
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 16px;
        }

        .custom-option:hover {
            background-color: rgba(212, 175, 55, 0.2);
        }

        #setup-error { color: var(--evil-color); font-weight: bold; margin: 10px 0; min-height: 20px; }

        /* ====== 3D 翻牌動畫 CSS ====== */
        .card-container {
            perspective: 1000px; 
            border: none;
            padding: 0;
            margin: 20px auto;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            background-color: transparent;
            -webkit-touch-callout: none;
            width: 280px; 
            height: 392px; 
            border-radius: 15px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); 
            transform-style: preserve-3d;
            position: relative;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .card-back {
            background-color: transparent;
            justify-content: center;
            align-items: center;
        }

        .card-front {
            background-image: url('https://i.postimg.cc/Kz4pwxC0/66666.jpg');
            background-size: cover;
            background-position: center;
            transform: rotateY(180deg);
            box-sizing: border-box;
            border: none; 
            display: block; 
            position: relative; 
            padding: 0; 
        }

        #card-back-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .card-back .instruction {
            position: absolute;
            bottom: 55px; 
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--gold);
        }
        
        /* 角色名稱定位 */
        #player-role-name {
            margin: 0;
            font-size: 32px; 
            position: absolute;
            top: 55px; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        /* 角色圖案定位 */
        .role-img {
            width: 156px; 
            height: 156px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            object-fit: contain; 
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            background-color: #222;
            pointer-events: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            margin: 0; 
        }

        /* 角色資訊定位 */
        #player-info-text { 
            font-size: 16px; 
            line-height: 1.5; 
            background: transparent; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9); 
            padding: 8px 10px; 
            border-radius: 8px; 
            box-sizing: border-box;
            position: absolute; 
            bottom: 45px; 
            left: 50%; 
            transform: translateX(-50%); 
            margin: 0; 
            width: 85%; 
        }

        /* ====== 遊戲結束樣式 ====== */
        
        #game-screen.active {
            display: flex;
            flex-direction: column;
            min-height: 500px; 
            padding: 0; 
        }
        
        #game-end-controls {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #reveal-all-btn {
            width: 200px; 
            height: 200px; 
            padding: 15px; 
            font-size: 26px; 
            font-weight: 900; 
            border-radius: 15px; 
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.4;
            margin: 0; 

            background-color: var(--warning-yellow);
            color: #000000; 
            text-shadow: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }

        #reveal-all-btn:hover {
            background-color: #e6b800;
            transform: translateY(-3px);
        }

        #final-reveal-list {
            display: flex;
            gap: 15px; 
            margin-top: 15px;
        }

        .final-reveal-column {
            flex: 1;
            background: transparent; 
            border: 4px solid var(--gold); 
            border-radius: 10px;
            padding: 10px; 
            display: flex;
            flex-direction: column;
            gap: 10px; 
            box-sizing: border-box;
        }
        
        .final-reveal-item {
            background: rgba(34, 34, 34, 0.95); 
            border: 1px solid #444; 
            border-radius: 8px;
            margin: 0; 
            padding: 12px 5px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .player-number-text {
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .action-white-text {
            color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1 style="color: #B58252;">阿瓦隆小幫手</h1>
        
        <div class="role-list">
            <h3>選擇遊戲人數</h3>
            
            <div class="custom-select-wrapper">
                <input type="hidden" id="player-count" value="10">
                <div class="custom-select-display" id="custom-select-display">
                    <span>10 人局 (<span class="good">6好人</span> <span class="evil">4壞人</span>)</span>
                    <span style="font-size: 12px;">▼</span>
                </div>
                <div class="custom-select-options" id="custom-select-options">
                    <div class="custom-option" data-value="5">5 人局 (<span class="good">3好人</span> <span class="evil">2壞人</span>)</div>
                    <div class="custom-option" data-value="6">6 人局 (<span class="good">4好人</span> <span class="evil">2壞人</span>)</div>
                    <div class="custom-option" data-value="7">7 人局 (<span class="good">4好人</span> <span class="evil">3壞人</span>)</div>
                    <div class="custom-option" data-value="8">8 人局 (<span class="good">5好人</span> <span class="evil">3壞人</span>)</div>
                    <div class="custom-option" data-value="9">9 人局 (<span class="good">5好人</span> <span class="evil">4壞人</span>)</div>
                    <div class="custom-option" data-value="10">10 人局 (<span class="good">6好人</span> <span class="evil">4壞人</span>)</div>
                </div>
            </div>

            <h3>選擇特殊角色</h3>
            <p style="font-size: 12px; color: #ccc;">空位自動補<span class="good">忠臣</span>或<span class="evil">爪牙</span></p>
            
            <input type="checkbox" id="role-merlin" class="role-checkbox" checked>
            <label for="role-merlin" class="role-item good">梅林</label>

            <input type="checkbox" id="role-percival" class="role-checkbox" checked>
            <label for="role-percival" class="role-item good">派西維爾</label>

            <input type="checkbox" id="role-lizakang" class="role-checkbox">
            <label for="role-lizakang" class="role-item good">李砸康</label>

            <input type="checkbox" id="role-assassin" class="role-checkbox" checked>
            <label for="role-assassin" class="role-item evil">刺客</label>

            <input type="checkbox" id="role-morgana" class="role-checkbox" checked>
            <label for="role-morgana" class="role-item evil">莫甘娜</label>

            <input type="checkbox" id="role-mordred" class="role-checkbox" checked>
            <label for="role-mordred" class="role-item evil">莫德雷德</label>

            <input type="checkbox" id="role-oberon" class="role-checkbox" checked>
            <label for="role-oberon" class="role-item evil">奧伯倫</label>
        </div>
        
        <div id="setup-error"></div>
        <button class="btn-gold" onclick="startGame()">開始分配角色</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2 id="current-player-title"><span class="player-number-text">1號</span> <span class="action-white-text">請查驗身分 🔍</span></h2>
        
        <div class="card-container" id="reveal-card">
            <div class="card-inner" id="card-inner">
                <div class="card-face card-back">
                    <img src="https://i.postimg.cc/QdHBXdPk/card0back.png" alt="Avalon Card Back" id="card-back-img">
                    <div class="instruction">👆 點擊翻開</div>
                </div>
                <div class="card-face card-front" id="card-content">
                    <h2 id="player-role-name">角色名稱</h2>
                    <img id="player-role-img" class="role-img" src="" alt="角色圖片">
                    <div id="player-info-text">你的專屬資訊將顯示於此。</div>
                </div>
            </div>
        </div>
        
        <button id="next-player-btn" onclick="nextPlayer()" style="display:none;">看完了 下一位</button>
    </div>

    <div id="game-screen" class="screen">
        
        <div id="game-end-controls">
            <button id="reveal-all-btn" onclick="revealAll()">遊戲結束<br>查看所有人<br>身分</button>
        </div>

        <div id="final-reveal-area" style="display: none; margin-top: 30px;">
            <h3 style="margin-bottom: 20px;">真實身分揭曉</h3>
            <div id="final-reveal-list"></div>
            <button class="btn-gold" onclick="location.reload()" style="margin-top: 30px; padding: 15px 30px; font-size: 18px;">重新一局</button>
        </div>
    </div>

    <script>
        const preloadedBg = new Image();
        preloadedBg.src = "https://i.postimg.cc/Kz4pwxC0/66666.jpg";

        const roleData = {
            merlin: { name: "梅林", isEvil: false, img: "https://i.postimg.cc/hjV0JNdY/7.jpg" },
            percival: { name: "派西維爾", isEvil: false, img: "https://i
